<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase Interactiva - Estudiante</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" style="flex-direction: column;">
        
        <header class="student-header">
            <div class="brand" style="margin-bottom: 0;">
                <i class="fas fa-graduation-cap"></i><h2>Portal del Estudiante</h2>
            </div>
            
            <div class="page-controls">
                <button id="btn-prev-page" title="Página Anterior"><i class="fas fa-chevron-left"></i></button>
                <span id="page-indicator">Carga una lección (.json) para empezar</span>
                <button id="btn-next-page" title="Página Siguiente"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="zoom-controls">
                <button id="btn-zoom-out" title="Alejar"><i class="fas fa-search-minus"></i></button>
                <span id="zoom-level">100%</span>
                <button id="btn-zoom-in" title="Acercar"><i class="fas fa-search-plus"></i></button>
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="file" id="file-lesson" accept=".json" style="display: none;">
                <button class="btn-primary" id="btn-load-lesson" style="width: auto;"><i class="fas fa-folder-open"></i> Abrir Lección</button>
                <button class="btn-success" id="btn-evaluate" style="width: auto; display: none;"><i class="fas fa-check-double"></i> Revisar</button>
            </div>
        </header>

        <main class="workspace" style="flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;">
            <div class="canvas-container">
                <div class="canvas-container-outer">
                    <canvas id="student-canvas" width="794" height="1123"></canvas>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="student.js"></script>
</body>
</html>
